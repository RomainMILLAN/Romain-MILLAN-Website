# Production environment (standalone)
services:
  php:
    image: rmw.php:latest
    container_name: rmw.php
    build:
      context: .
      target: frankenphp_prod
    restart: unless-stopped
    environment:
      APP_SECRET: ${APP_SECRET}
      APP_ENV: prod
      SERVER_NAME: ":${APP_PORT:-9921}"
      # DATABASE_URL is set in .env.local (passed via env_file)
    volumes:
      - ./var:/app/var
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - .env
      - .env.local
    network_mode: "host"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2019/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    container_name: rmw.database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    network_mode: "host"
    command: ["postgres", "-p", "${POSTGRES_PORT:-9922}"]
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}", "-p", "${POSTGRES_PORT:-9922}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - ./database_data:/var/lib/postgresql/data:rw

volumes:
  caddy_data:
  caddy_config:
