# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Le backend FrankenPHP n'est joignable que depuis le réseau privé (NPM en
    # frontal). On fait confiance aux sous-réseaux privés pour exploiter les
    # X-Forwarded-* (notamment le scheme https forcé dans frankenphp/Caddyfile).
    trusted_proxies: 'PRIVATE_SUBNETS'
    trusted_headers: [ 'x-forwarded-for', 'x-forwarded-proto', 'x-forwarded-port', 'x-forwarded-host' ]
    http_method_override: true
    handle_all_throwables: true

    # Note that the session will be started ONLY if you read or write from it.
    session:
        name: SULUSESSID
        cookie_path: /

    #esi: true
    #fragments: true

    router:
        default_uri: '%env(ROUTER_REQUEST_CONTEXT_SCHEME)%://%env(ROUTER_REQUEST_CONTEXT_HOST)%'

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
